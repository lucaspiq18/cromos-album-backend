services:
  - type: web
    name: cromos-album-api
    runtime: node
    region: frankfurt      # más cercano a España
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000        # Render asigna el puerto 10000 por defecto
      - key: DATABASE_URL
        sync: false         # se rellena manualmente en el dashboard de Render
      - key: JWT_SECRET
        generateValue: true # Render genera uno aleatorio automáticamente
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_CLUB_ACCOUNT_ID
        sync: false
      - key: R2_ENDPOINT
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET
        sync: false
      - key: R2_PUBLIC_URL
        sync: false
